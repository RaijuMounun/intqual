name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # STAGE 1: Build release binaries for all platforms.
  # Artifacts are uploaded to CI, NOT directly to GitHub Releases.
  # This eliminates the race condition where 3 runners fight over
  # the same Release page simultaneously.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: intqual
            asset_name: intqual-linux-amd64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: intqual.exe
            asset_name: intqual-windows-amd64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: intqual
            asset_name: intqual-macos-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: intqual
            asset_name: intqual-macos-aarch64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Move-Item -Path "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" -Destination "${{ matrix.asset_name }}"

      - name: Upload Build Artifact to CI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 2: Create a single GitHub Release and attach ALL binaries.
  # Runs only ONCE after all builds complete. Uses if: !cancelled() so
  # that a single platform failure (e.g. macos-13) does not block the
  # entire release — the remaining successful binaries are still shipped.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() }}
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify Artifacts Exist
        run: |
          echo "=== Downloaded Artifacts ==="
          ls -lah artifacts/
          FILE_COUNT=$(find artifacts/ -type f | wc -l)
          echo "Total artifacts: $FILE_COUNT"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No artifacts found — all builds failed. Aborting release."
            exit 1
          fi

      - name: Upload Release Assets to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────
  # STAGE 3: Publish to package managers (all run in parallel after release)
  # ──────────────────────────────────────────────────────────────────────

  # Crates.io requires the version in Cargo.toml to match the tag.
  # This job extracts the version from the git tag, patches Cargo.toml,
  # publishes to crates.io, and commits the version bump back to master
  # so the repo stays in sync.
  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.result == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Sync Cargo.toml Version with Tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Extracted version: $VERSION"

          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Current Cargo.toml version: $CURRENT"

          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
            echo "Updated Cargo.toml to $VERSION"
          else
            echo "Cargo.toml already at $VERSION, skipping update"
          fi

      - name: Publish to Crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }} --allow-dirty

      - name: Commit Version Bump Back to Master
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push origin HEAD:refs/heads/master
          }

  publish-winget:
    name: Publish to Winget
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.result == 'success' }}
    steps:
      - name: Submit manifest to Windows Package Manager
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: RaijuMounun.intqual
          installers-regex: '\.exe$'
          max-retries: 5
          token: ${{ secrets.WINGET_TOKEN }}

  publish-homebrew:
    name: Publish to Homebrew
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.result == 'success' }}
    steps:
      - name: Release to Homebrew Tap
        uses: Justintime50/homebrew-releaser@v1
        with:
          homebrew_owner: RaijuMounun
          homebrew_tap: homebrew-intqual
          formula_folder: Formula
          github_token: ${{ secrets.WINGET_TOKEN }}
          commit_owner: RaijuMounun
          commit_email: erenkeskinoglu@outlook.com
          install: 'bin.install "intqual"'
          test: 'system "#{bin}/intqual", "--version"'