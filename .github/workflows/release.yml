name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: intqual
            asset_name: intqual-linux-amd64
          - os: windows-latest
            artifact_name: intqual.exe
            asset_name: intqual-windows-amd64.exe
          - os: macos-latest
            artifact_name: intqual
            asset_name: intqual-macos-amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Release Binary
        run: cargo build --release

      - name: Rename Artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Move-Item -Path "target\release\${{ matrix.artifact_name }}" -Destination "${{ matrix.asset_name }}"

      - name: Upload Release Assets to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    name: Publish to Winget
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Submit manifest to Windows Package Manager
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: RaijuMounun.intqual
          installers-regex: '\.exe$'
          max-retries: 5
          token: ${{ secrets.WINGET_TOKEN }}

  publish-homebrew:
    name: Publish to Homebrew
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Release to Homebrew Tap
        uses: Justintime50/homebrew-releaser@v1
        with:
          homebrew_owner: RaijuMounun
          homebrew_tap: homebrew-intqual
          formula_folder: Formula
          github_token: ${{ secrets.WINGET_TOKEN }}
          commit_owner: RaijuMounun
          commit_email: erenkeskinoglu@outlook.com
          depends_on: '"rust" => :build'
          install: 'system "cargo", "install", *std_cargo_args'
          test: 'system "#{bin}/intqual --version"'

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          branch: main # Değişikliği ana dala yazabilmesi için

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Update Cargo.toml Version & Commit Back
        run: |
          # v1.0.5 etiketinden 'v' harfini uçurup sadece 1.0.5 sürümünü alıyoruz
          VERSION=${GITHUB_REF_NAME#v}
          
          # Cargo.toml içindeki ilk 'version = "X.X.X"' alanını yeni sürümle değiştiriyoruz
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          
          # Bu değişikliği depodaki main branch'e otomatik commit'leyip pushluyoruz
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Publish to Crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}